<!DOCTYPE html>
<html>

{% include head.html %}

<body>
    {% include navbar.html %}

    <section class="hero is-fullheight" id="blog">
        <div class="hero-body">
            <div class="container">
                {% include blogpage-heading.html %}
            </div>
        </div>
        <div id="results-container"></div>
        <!--Blog Cards Section-->
        {% for post in site.posts %}
            {% include blog-card.html %}
        {% endfor %}

        <a data-flickr-embed="true" data-context="true" href="https://www.flickr.com/photos/201246370@N07/54228327853/in/album-72177720322810852" title="171616 C"><img src="https://live.staticflickr.com/65535/54228327853_ef8a0d7e00_n.jpg" width="212" height="320" alt="171616 C"/></a><script async src="//embedr.flickr.com/assets/client-code.js" charset="utf-8"></script>

        <a data-flickr-embed="true" href="https://www.flickr.com/photos/201246370@N07/54227185542/in/album-72177720322810852/" title="171527 copy"><img src="https://live.staticflickr.com/65535/54227185542_73413210f4_s.jpg" width="75" height="75" alt="171527 copy"/></a><script async src="//embedr.flickr.com/assets/client-code.js" charset="utf-8"></script>

        <a data-flickr-embed="true" data-context="true" href="https://www.flickr.com/photos/201246370@N07/54227185552/in/album-72177720322810852" title="171528 2 copy"><img src="https://live.staticflickr.com/65535/54227185552_475df38046_t.jpg" width="66" height="100" alt="171528 2 copy"/></a><script async src="//embedr.flickr.com/assets/client-code.js" charset="utf-8"></script>
    </section>
    <br>
    <!--Footer begins here-->
    {% include footer.html %}
    <script src="{{site.url}}{{site.baseurl}}/assets/js/simple-jekyll-search.js"></script>

    <script>
        SimpleJekyllSearch({
            searchInput: document.getElementById('search'),
            resultsContainer: document.getElementById('results-container'),
            json: '{{site.url}}{{site.baseurl}}/search.json',
            searchResultTemplate: '<div style="border: 0.15rem dashed black" class="searchResult columns has-text-centered" id="blog-card"><div class="column is-marginless is-paddingless is-one-third-desktop is-one-third-fullhd is-one-third-tablet"><div class="image is-16by9" style="background-image: url({image});"></div></div><a href="{url}"><div class="column has-text-left-desktop has-text-left-tablet"><h1 class="title is-size-4-touch">{title}</h1><div class="content has-text-grey">{content}<hr class="has-background-grey"><span class="has-text-grey">Published on <span class="has-text-weight-semibold">{date}</span></span> | <i class="fas fa-clock"></i> <span class="has-text-weight-semibold">{readtime} min</span> read</div></div></a></div>',
            noResultsText: '<div class="subtitle has-text-centered is-uppercase">No Results Found</div><hr class="has-background-black" style="margin: 0.5rem 5rem 2.5rem 5rem">',
            fuzzy: true,
        });
    </script>
</body>

</html>
